<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATIDOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Barlow', sans-serif; margin: 0; padding: 0; }
    #store { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; }
    .product-card { border: 1px solid #ccc; padding: 15px; width: 220px; }
    .product-card img { max-width: 100%; height: auto; }
    .product-card h3 { margin: 0 0 10px; }
  </style>
</head>
<body>
  <h1>LATIDOS - Tienda</h1>
  <div id="store"></div>

  <script>
    async function loadProductsFromCloud() {
      try {
        const res = await fetch('/.netlify/functions/products');
        if (!res.ok) throw new Error('Error al cargar productos');
        return await res.json();
      } catch (e) {
        console.error(e);
        return [];
      }
    }

    function renderStore(filter) {
      const container = document.getElementById('store');
      container.innerHTML = '';

      products
        .filter(p => filter === 'all' || p.cat === filter)
        .forEach(p => {
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <p>Precio tarjeta: $${p.priceTarjeta}</p>
            ${p.priceTransf ? `<p>Precio transferencia: $${p.priceTransf}</p>` : ''}
            <p>Talles: ${p.sizes.join(', ')}</p>
            ${p.badge ? `<span>${p.badge}</span>` : ''}
            ${p.photos.length ? `<img src="${p.photos[0]}" alt="${p.name}">` : ''}
          `;
          container.appendChild(card);
        });
    }

    async function init() {
      const cloud = await loadProductsFromCloud();
      if (cloud.length > 0) products = cloud;
      else products = [];
      renderStore('all');
    }

    let products = [];
    init();
  </script>
</body>
</html>

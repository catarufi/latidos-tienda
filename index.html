<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATIDOS | Tienda Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Estilos base simplificados para asegurar que cargue rápido */
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{ --black:#000; --white:#fff; --gray:#f5f5f5; --border:#e0e0e0; }
        body{font-family:'Barlow',sans-serif; background:var(--white); color:#111;}
        
        /* Nav & Logo */
        nav{ position:sticky; top:0; z-index:100; background:rgba(255,255,255,.97); border-bottom:1px solid var(--border); padding:1rem; display:flex; justify-content:space-between; align-items:center;}
        .logo{font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:900; letter-spacing:0.1em;}
        
        /* Grid de Productos */
        .section{padding:2rem 1.2rem; max-width:1200px; margin:0 auto;}
        .product-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
        @media(min-width:900px){ .product-grid{ grid-template-columns:repeat(4,1fr); } }
        
        .product-card{ border:1px solid var(--border); padding:10px; transition:0.3s; }
        .product-card:hover{ box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .p-img{ width:100%; aspect-ratio:3/4; object-fit:cover; background:#eee; margin-bottom:10px; }
        .p-name{ font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; margin-bottom:5px; }
        .p-price{ font-weight:900; color:var(--black); }
        .p-transf{ color:green; font-size:0.8rem; margin-bottom:10px; }
        .btn-add{ width:100%; background:var(--black); color:white; border:none; padding:10px; cursor:pointer; font-family:'Barlow Condensed',sans-serif; text-transform:uppercase;}
    </style>
</head>
<body>

    <nav>
        <div class="logo">LATIDOS</div>
        <div>Bolsa (<span id="cartCount">0</span>)</div>
    </nav>

    <div class="section">
        <h2 style="margin-bottom:20px; font-family:'Barlow Condensed'; text-transform:uppercase;">Nueva Colección</h2>
        <div class="product-grid" id="productGrid">
            <p id="loading">Cargando productos...</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Aquí es donde la web busca tus productos
        // Asegurate de que en GitHub tengas una carpeta llamada 'productos'
        const PRODUCT_FOLDER = '/productos/'; 

        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            try {
                // Como Netlify/GitHub no te dan una lista de archivos automática,
                // la mejor forma es tener un archivo "maestro" llamado productos.json
                const response = await fetch('/productos/productos.json');
                
                if (!response.ok) throw new Error("No se encontró productos.json");
                
                const products = await response.json();
                
                if (products.length === 0) {
                    grid.innerHTML = "<p>No hay productos disponibles por ahora.</p>";
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <img class="p-img" src="${p.photos && p.photos[0] ? p.photos[0] : 'https://via.placeholder.com/300x400'}" alt="${p.name}">
                        <div class="p-name">${p.name}</div>
                        <div class="p-price">$${p.priceTarjeta}</div>
                        <div class="p-transf">$${p.priceTransf} (Efectivo/Transf)</div>
                        <button class="btn-add">Comprar</button>
                    </div>
                `).join('');

            } catch (error) {
                console.error(error);
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align:center; padding:50px;">
                        <p>Para ver los productos, asegurate de subir el archivo <strong>productos.json</strong> a la carpeta productos en GitHub.</p>
                    </div>`;
            }
        }

        // Ejecutar al cargar la página
        loadProducts();
    </script>
</body>
</html>
